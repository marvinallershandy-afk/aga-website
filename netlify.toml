# Deploy-Konfiguration (CI-tauglich, relative Pfade).
# release = öffentliche v13-Website + /admin-Cockpit in einem Build.
# Hinweis: .netlify/netlify.toml ist lokaler CLI-State (gitignored) und enthielt
# einen absoluten publish-Pfad — diese Datei hier ist die verbindliche Config.

[build]
  command = "pnpm build"
  publish = "dist"

# Rechtsseiten als eigenständige statische HTML-Dateien (public/).
# MÜSSEN vor dem SPA-Fallback stehen — Netlify wertet Redirects von oben nach
# unten aus, der erste Treffer gewinnt. Sonst bögen die /*-Regel die hübschen
# URLs (/impressum) auf den 3D-Onepager um.
# Grund für statische Seiten statt In-App-Route: Impressum/Datenschutz müssen
# ständig verfügbar sein (§ 5 DDG) — auch ohne WebGL und ohne JavaScript.
[[redirects]]
  from = "/impressum"
  to = "/impressum.html"
  status = 200

[[redirects]]
  from = "/datenschutz"
  to = "/datenschutz.html"
  status = 200

# SPA-Fallback: deckt sowohl den 3D-Onepager als auch /admin/* ab.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ── Cache-Kontrolle (v13-E10) ─────────────────────────────────
# Vite-Assets tragen Content-Hashes im Dateinamen → für immer cachebar.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Große, selten wechselnde Medien: lange cachen, aber revalidierbar
# (Dateinamen sind NICHT gehasht — bei Austausch greift der ETag).
[[headers]]
  for = "/audio/*"
  [headers.values]
    Cache-Control = "public, max-age=604800, stale-while-revalidate=86400"

[[headers]]
  for = "/models/*"
  [headers.values]
    Cache-Control = "public, max-age=604800, stale-while-revalidate=86400"

[[headers]]
  for = "/draco/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000, immutable"

[[headers]]
  for = "/players/*"
  [headers.values]
    Cache-Control = "public, max-age=604800, stale-while-revalidate=86400"

[[headers]]
  for = "/fans/*"
  [headers.values]
    Cache-Control = "public, max-age=604800, stale-while-revalidate=86400"

[[headers]]
  for = "/brand/*"
  [headers.values]
    Cache-Control = "public, max-age=604800, stale-while-revalidate=86400"
